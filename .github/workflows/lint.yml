name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Read-only by default. No step in this workflow writes back to the repo,
# uploads packages, or needs to touch issues / PRs. Restrict the default
# GITHUB_TOKEN accordingly.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eslint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run eslint
        working-directory: frontend
        # The lint command targets the configured globs in eslint.config.js
        # (src/ + tests/ + the config files themselves). Generated dirs
        # (test-results/, playwright-report-*/, dist/, node_modules/) are
        # explicitly ignored — without those exclusions the lint output
        # is drowned by minified vendor bundles in the HTML reports.
        run: npm run lint
