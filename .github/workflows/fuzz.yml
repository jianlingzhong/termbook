name: Fuzz

# Fuzz-tests the OSC marker parser (backend/parser.js) with jsfuzz.
# The parser consumes untrusted bytes from PTY stdout — anything a
# running command can write — so it must never throw or hang on
# malformed input.
#
# Runs nightly (10-minute budget) and on every PR to backend/parser.js.
# A finding fails the workflow + uploads the offending input as an
# artifact so it can be added to the regression test suite.

on:
  push:
    branches: [main]
    paths:
      - 'backend/parser.js'
      - 'backend/parser.fuzz.js'
      - '.github/workflows/fuzz.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/parser.js'
      - 'backend/parser.fuzz.js'
  schedule:
    # 04:23 UTC nightly — offset minute, off-peak hour.
    - cron: '23 4 * * *'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    runs-on: ubuntu-latest
    # 5-min fuzz budget + ~2 min setup overhead + headroom = 10 min cap.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      - name: Install jsfuzz (pinned version for reproducibility)
        run: npm install -g jsfuzz@1.0.15

      - name: Run fuzz target (5 min budget)
        working-directory: backend
        # jsfuzz doesn't have a built-in time limit — it runs until killed.
        # Wrap with `timeout` to enforce a 5-min ceiling. Exit code 124
        # from `timeout` means "ran for the full duration without finding
        # a bug" (that's success, since fuzzing is open-ended). Any other
        # non-zero exit is a real crash that jsfuzz found.
        run: |
          mkdir -p fuzz-corpus
          set +e
          timeout --preserve-status 300 jsfuzz parser.fuzz.js fuzz-corpus
          rc=$?
          if [ "$rc" -eq 124 ] || [ "$rc" -eq 143 ] || [ "$rc" -eq 0 ]; then
            echo "Fuzz run completed (rc=$rc) — no bugs found."
            exit 0
          fi
          echo "::error::jsfuzz found a parser bug (rc=$rc)"
          exit 1

      - name: Upload crash inputs on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: fuzz-crashes
          path: backend/crash-*
          retention-days: 14
          if-no-files-found: ignore
