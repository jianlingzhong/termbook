name: OSSF Scorecard

# Open Source Security Foundation Scorecard — grades the repo on
# supply-chain security best practices (signed commits, branch protection,
# pinned dependencies, etc.). The badge on the README links to a public
# evaluation page at scorecard.dev.
#
# Free for public repos. Results upload to GitHub's code scanning view
# AND publish to a public API (api.securityscorecards.dev) so anyone can
# see the score without a GitHub account.

on:
  branch_protection_rule:    # re-evaluate when branch protection changes
  schedule:
    - cron: '47 3 * * 1'     # Monday 03:47 UTC, offset to avoid rush hour
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      # Required for uploading results to code scanning view.
      security-events: write
      # Required for publishing results to the OSSF API.
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@05b42c624433fc40578a4040d5cf5e36ddca8cde # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Set to true to publish to the OSSF API (makes the public badge work).
          publish_results: true
          # If a SCORECARD_TOKEN secret exists (fine-grained PAT with
          # Administration: read-only on this repo), pass it so the
          # Branch-Protection and Webhooks checks can read settings the
          # default GITHUB_TOKEN can't. Falls back to GITHUB_TOKEN
          # silently when the secret is unset (both other checks just
          # skip Branch-Protection in that case).
          repo_token: ${{ secrets.SCORECARD_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Upload artifact (SARIF)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF results
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: results.sarif
