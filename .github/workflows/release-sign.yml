name: Sign release artifacts

# When a GitHub Release is published, build a source-tarball artifact,
# sign it with cosign (sigstore keyless OIDC — no pre-shared key
# management required), and attach the signature + transparency-log
# entry to the release.
#
# This satisfies OSSF Scorecard's Signed-Releases check without
# requiring GPG key management. Verifies via:
#
#   cosign verify-blob \
#     --certificate-identity-regexp '^https://github.com/jianlingzhong/termbook/.*' \
#     --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
#     --signature termbook-VERSION.tar.gz.sig \
#     --certificate termbook-VERSION.tar.gz.pem \
#     termbook-VERSION.tar.gz

on:
  release:
    types: [published]

permissions:
  contents: write    # required to upload signed assets to the release
  id-token: write    # required for sigstore keyless signing via OIDC

jobs:
  sign:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Install cosign
        uses: sigstore/cosign-installer@d7543c93d881b35a8faa02e8e3605f69b7a1ce62 # v3.10.0

      - name: Build source tarball
        run: |
          VERSION='${{ github.event.release.tag_name }}'
          TARNAME="termbook-${VERSION#v}.tar.gz"
          # `git archive` produces a clean tarball from a ref (no
          # node_modules, no test-results, exactly what's tracked).
          git archive --format=tar.gz --prefix="termbook-${VERSION#v}/" \
            -o "${TARNAME}" HEAD
          ls -la "${TARNAME}"
          echo "TARNAME=${TARNAME}" >> "${GITHUB_ENV}"

      - name: Sign tarball with cosign (keyless)
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          cosign sign-blob --yes \
            --output-signature "${TARNAME}.sig" \
            --output-certificate "${TARNAME}.pem" \
            "${TARNAME}"

      - name: Upload signed assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload '${{ github.event.release.tag_name }}' \
            "${TARNAME}" "${TARNAME}.sig" "${TARNAME}.pem" \
            --repo '${{ github.repository }}' \
            --clobber
