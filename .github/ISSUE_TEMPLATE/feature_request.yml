name: Feature request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Quick check first: [`docs/known-issues.md`](https://github.com/jianlingzhong/termbook/blob/main/docs/known-issues.md) lists what's deliberately out of scope (multi-user, AI integration, native packaging, etc.).

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user need is unmet today?
      placeholder: |
        When I do X, I have to manually do Y because Termbook doesn't…
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would the user-visible behavior look like?
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why this one wins
    validations:
      required: false
